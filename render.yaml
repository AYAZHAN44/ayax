services:
  - type: web
    name: dr-ayazhan-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dr-ayazhan-db
          property: connectionString

databases:
  - name: dr-ayazhan-db
    plan: free
